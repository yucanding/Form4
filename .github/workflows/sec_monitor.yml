name: SEC Form 4 Multi-Channel Monitor

on:
  schedule:
    # 1. 周一：从美东早 4 点开始 (UTC 08:00) 直到深夜
    - cron: '*/15 8-23 * * 1'
    
    # 2. 周二、周三、周四、周五：全天 24 小时不停歇运行
    - cron: '*/15 * * * 2-5'
    
    # 3. 周六：运行到美东周五晚 9 点 (UTC 周六 01:00) 结束
    # 00:00, 00:15, 00:30, 00:45 UTC 对应美东周五晚 8:00-8:45 PM
    - cron: '*/15 0 * * 6'

  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须允许写入权限，才能更新已读列表文件
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser curl_cffi beautifulsoup4 yfinance

      - name: Run Monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Save State
        run: |
          git config --global user.name "sec-bot"
          git config --global user.email "bot@sec.gov"
          git add processed_ids.txt
          git commit -m "update state" || echo "no changes"
          git push
