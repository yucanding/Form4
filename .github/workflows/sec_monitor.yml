name: SEC Form 4 Multi-Channel Monitor

on:
  schedule:
    # 这里的 Cron 涵盖了美东周一早6点到周五晚9点 (每10分钟运行一次)
    # 注意：GitHub Cron 使用的是 UTC 时间
    - cron: '*/10 10-23 * * 1-5' # 周一至周五 10:00-23:50 UTC (美东 6am-7pm)
    - cron: '*/10 0-1 * * 2-6'   # 周二至周六 00:00-01:50 UTC (美东 8pm-9pm)
  workflow_dispatch: # 允许你手动点击运行

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须允许写入权限，才能更新已读列表文件
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser curl_cffi beautifulsoup4 yfinance

      - name: Run Monitor
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Save State
        run: |
          git config --global user.name "sec-bot"
          git config --global user.email "bot@sec.gov"
          git add processed_ids.txt
          git commit -m "update state" || echo "no changes"
          git push
