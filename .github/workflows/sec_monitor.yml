name: SEC Form 4 Multi-Channel Monitor

on:
  # 1. 注释掉内部定时器，由外部 cron-job.org 唤醒以提高精准度
  # schedule:
  #   - cron: '*/15 8-23 * * 1'
  #   - cron: '*/15 * * * 2-5'
  #   - cron: '*/15 0 * * 6'

  # 2. 必须保留这个，API 触发的唯一入口
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 允许写入权限以更新 processed_ids.txt
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # 建议升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install feedparser curl_cffi beautifulsoup4 yfinance

      - name: Run Monitor
        env:
          # 请确保 GitHub Secrets 中这两个名字准确无误
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        # ⚠️ 注意：这里运行的是 main.py，请确保你的文件名是 main.py 而不是 monitor.py
        run: python main.py

      - name: Save State
        run: |
          git config --global user.name "sec-bot"
          git config --global user.email "bot@sec.gov"
          git add processed_ids.txt
          # 使用 [skip ci] 防止触发循环运行
          git commit -m "chore: update processed_ids [skip ci]" || echo "no changes"
          git push
